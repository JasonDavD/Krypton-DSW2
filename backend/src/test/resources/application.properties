# Overrides SOLO para tests. Un application.properties (en vez de .yml) NO shadowea el
# application.yml de main: convive y solo sobrescribe estas claves.
# Sin Eureka en tests: el cliente queda apagado para no colgar el arranque del contexto
# buscando un registry que no existe en el entorno de test.
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
