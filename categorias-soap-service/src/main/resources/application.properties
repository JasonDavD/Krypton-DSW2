server.port=8095
spring.application.name=categorias-soap-service

# DB propia del servicio (schema `categorias` en el contenedor MySQL `db`, como catalogo).
# createDatabaseIfNotExist=true: si no existe, MySQL la crea sola (no requiere mysql-init).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/categorias?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:krypton}
spring.datasource.password=${DB_PASSWORD:krypton}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Sin JPA (usamos JdbcTemplate): creamos/seedeamos la tabla con schema.sql + data.sql en cada
# arranque. Ambos son idempotentes (IF NOT EXISTS / ON DUPLICATE KEY).
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
