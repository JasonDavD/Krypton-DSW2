server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida sirve index.html y React Router la resuelve en el cliente
    # (sin esto, recargar en /catalogo o /pedidos/5 daría 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
